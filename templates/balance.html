<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Пополнение баланса | DARK</title>
    <style>
        :root {
            --bg-main: #05070f;
            --bg-card: #0b0e22;
            --bg-input: #121834;
            --text-color: #ffffff;
            --text-muted: #626b8f;
            --accent: #2e66ff;
            --accent-hover: #1a4fd6;
            --success: #10b981;
            --success-hover: #059669;
            --danger: #ef4444;
            --border: #1a224c;
        }
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Segoe UI', sans-serif; }
        body { background-color: var(--bg-main); color: var(--text-color); min-height: 100vh; display: flex; flex-direction: column; }

        header { background-color: var(--bg-card); border-bottom: 1px solid var(--border); padding: 15px 30px; display: flex; justify-content: space-between; align-items: center; }
        .logo-section { display: flex; align-items: center; gap: 30px; }
        .logo { font-size: 22px; font-weight: 800; letter-spacing: 2px; color: #fff; text-decoration: none; }
        nav { display: flex; gap: 20px; }
        nav a { color: var(--text-muted); text-decoration: none; font-size: 14px; font-weight: 500; }
        nav a:hover, nav a.active { color: var(--text-color); }
        .user-menu { display: flex; align-items: center; gap: 15px; }
        .user-badge { display: flex; align-items: center; gap: 10px; background: var(--bg-input); padding: 6px 14px; border-radius: 20px; border: 1px solid var(--border); }
        .avatar-mini { width: 24px; height: 24px; border-radius: 50%; object-fit: cover; border: 1px solid var(--accent); }

        .announcement-bar { background: linear-gradient(90deg, rgba(46, 102, 255, 0.1), rgba(16, 185, 129, 0.1)); border-bottom: 1px solid var(--border); padding: 10px; text-align: center; font-size: 13px; color: var(--success); }

        main { flex: 1; display: flex; justify-content: center; align-items: center; padding: 40px 20px; }
        .balance-card { background-color: var(--bg-card); border: 1px solid var(--border); border-radius: 16px; max-width: 550px; width: 100%; padding: 40px; box-shadow: 0 10px 30px rgba(0,0,0,0.3); }
        .balance-card h2 { font-size: 24px; margin-bottom: 8px; }
        .current-bal { font-size: 14px; color: var(--text-muted); margin-bottom: 30px; }
        .current-bal span { color: var(--success); font-weight: 600; }
        
        .form-group { display: flex; flex-direction: column; gap: 10px; margin-bottom: 25px; }
        .form-group label { font-size: 11px; color: var(--text-muted); text-transform: uppercase; }
        .form-group input { background-color: var(--bg-input); border: 1px solid var(--border); border-radius: 10px; padding: 16px; color: #fff; font-size: 15px; outline: none; }

        .btn-submit { width: 100%; background-color: var(--success); color: #fff; border: none; padding: 16px; border-radius: 12px; font-size: 14px; font-weight: 600; cursor: pointer; }
        #qr-container { margin-top: 25px; display: flex; flex-direction: column; align-items: center; gap: 15px; padding-top: 25px; border-top: 1px solid var(--border); }
    </style>
</head>
<body>

    <header>
        <div class="logo-section">
            <a href="/" class="logo">DARK</a>
            <nav>
                <a href="/">Главная</a>
                <a href="/subscriptions">Подписки</a>
                <a href="/balance" class="active">Баланс</a>
                <a href="/promocodes">Промокоды</a>
                <a href="/support">Техподдержка</a>
            </nav>
        </div>
        <div class="user-menu">
            <div class="user-badge">
                <img src="{{ avatar }}" class="avatar-mini" alt="Avatar">
                <span class="username-txt">{{ username }}</span>
            </div>
            <a href="/logout" style="color:var(--text-muted); text-decoration:none; font-size:13px;">Выйти</a>
        </div>
    </header>

    <div class="announcement-bar">⚡ {{ global_announcement }}</div>

    <main>
        <div class="balance-card">
            <h2>Пополнение баланса</h2>
            <p class="current-bal">Текущий баланс: <span>${{ balance }}</span></p>
            <div class="form-group">
                <label>Сумма пополнения (В РУБЛЯХ)</label>
                <input type="number" id="amount-input" value="1000">
            </div>
            <button class="btn-submit" onclick="initPayment()">Создать QR-код для оплаты</button>

            <div id="qr-container" style="display: none;">
                <p style="font-size: 13px; color: var(--text-muted);">Сканируйте QR через банковское приложение:</p>
                <img src="" id="qr-image" style="border: 4px solid #fff; border-radius: 10px; width: 180px;" alt="QR">
                <button class="btn-submit" style="background-color: var(--accent);" onclick="verifyPayment()">Проверить транзакцию</button>
            </div>
        </div>
    </main>

    <script>
        async function initPayment() {
            let rub = document.getElementById("amount-input").value;
            let res = await fetch("/api/payment/tbank-init", {
                method: "POST",
                headers: {"Content-Type": "application/json"},
                body: JSON.stringify({ amount_rub: parseFloat(rub) })
            });
            let data = await res.json();
            if(res.ok) {
                document.getElementById("qr-image").src = data.qr_url;
                document.getElementById("qr-container").style.display = "flex";
            }
        }
        async function verifyPayment() {
            let rub = document.getElementById("amount-input").value;
            let res = await fetch("/api/payment/tbank-verify", {
                method: "POST",
                headers: {"Content-Type": "application/json"},
                body: JSON.stringify({ amount_rub: parseFloat(rub) })
            });
            if(res.ok) {
                alert("Оплата успешно зачислена!");
                window.location.reload();
            }
        }
    </script>
</body>
</html>
